apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  role: eks-karpenter-dev-karpenter-node-role

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-karpenter-terraform

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-karpenter-dev

  tags:
    Project: eks-karpenter-terraform
    ManagedBy: karpenter