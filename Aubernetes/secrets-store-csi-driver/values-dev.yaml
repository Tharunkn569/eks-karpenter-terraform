syncSecret:
  enabled: true

enableSecretRotation: true
rotationPollInterval: 2m

linux:
  enabled: true

windows:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

secrets:
  enabled: true
  secretName: dev/payments-microservice/db-credentials