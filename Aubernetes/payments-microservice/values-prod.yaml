namespace: payments
environment: prod
replicaCount: 4

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/payments-microservice
  tag: "prod-latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

hpa:
  enabled: true
  minReplicas: 4
  maxReplicas: 10
  cpuUtilization: 60

pdb:
  enabled: true
  maxUnavailable: 2

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

ingress:
  enabled: true
  host: payments.example.com

networkPolicy:
  enabled: true

config:
  logLevel: INFO

resourceQuota:
  requestsCpu: "10"
  requestsMemory: "10Gi"
  limitsCpu: "20"
  limitsMemory: "20Gi"
  pods: "100"

limitRange:
  defaultCpu: "1000m"
  defaultMemory: "1Gi"
  defaultRequestCpu: "250m"
  defaultRequestMemory: "256Mi"