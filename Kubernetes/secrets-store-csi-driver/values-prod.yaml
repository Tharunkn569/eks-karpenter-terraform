syncSecret:
  enabled: true

enableSecretRotation: true
rotationPollInterval: 1m

linux:
  enabled: true

windows:
  enabled: false

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

secrets:
  enabled: true
  secretName: prod/payments-microservice/db-credentials