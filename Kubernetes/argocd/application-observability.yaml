apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd
spec:
  project: microservices

  source:
    repoURL: https://github.com/Tharunkn569/eks-karpenter-terraform.git
    targetRevision: main
    path: Kubernetes/observability/adot-collector

  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true