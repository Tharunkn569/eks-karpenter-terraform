
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-microservice
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Tharunkn569/eks-karpenter-terraform.git
    targetRevision: main
    path: kubernetes/orders-microservice
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: orders

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
