apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payments-microservice
  namespace: argocd
spec:
  project: microservices

  source:
    repoURL: https://github.com/Tharunkn569/eks-karpenter-terraform.git
    targetRevision: main
    path: kubernetes/payments-microservice
    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: payments

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
