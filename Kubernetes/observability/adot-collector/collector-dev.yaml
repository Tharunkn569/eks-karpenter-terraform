apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: adot-collector
  namespace: observability
spec:
  mode: deployment

  serviceAccount: adot-collector

  replicas: 1

  config: |
    receivers:
      prometheus:
        config:
          scrape_configs:
            - job_name: kubernetes-nodes
              kubernetes_sd_configs:
                - role: node

            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod

            - job_name: kube-state-metrics
              static_configs:
                - targets:
                    - kube-state-metrics.kube-system.svc.cluster.local:8080

            - job_name: prometheus-node-exporter
              static_configs:
                - targets:
                    - prometheus-node-exporter.kube-system.svc.cluster.local:9100

    processors:
      batch: {}

    exporters:
      prometheusremotewrite:
        endpoint: ${AMP_REMOTE_WRITE_ENDPOINT}
        auth:
          authenticator: sigv4auth

    extensions:
      sigv4auth:
        region: us-east-1
        service: aps

    service:
      extensions:
        - sigv4auth
      pipelines:
        metrics:
          receivers:
            - prometheus
          processors:
            - batch
          exporters:
            - prometheusremotewrite