# Legacy reference only.
# Karpenter older versions used Provisioner resources.
# Current implementation uses NodePool and EC2NodeClass.

apiVersion: karpenter.sh/v1alpha5
kind: Provisioner
metadata:
  name: legacy-reference
spec:
  requirements:
    - key: karpenter.sh/capacity-type
      operator: In
      values: ["spot"]

  providerRef:
    name: legacy-reference

  ttlSecondsAfterEmpty: 30