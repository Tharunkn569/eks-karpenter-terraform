name: 01_CI_github_actions_AWS_ECR

on:
  push:
    branches:
      - main
    paths:
      - "app/payments-microservice/**"
      - "app/orders-microservice/**"
      - ".github/workflows/ci-ecr-build.yaml"

  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  IMAGE_TAG: ${{ github.sha }}

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    name: Build and Push Docker Images to Amazon ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Payments Docker Image
        run: |
          docker build -t payments-microservice:${{ env.IMAGE_TAG }} app/payments-microservice

      - name: Tag Payments Docker Image
        run: |
          docker tag payments-microservice:${{ env.IMAGE_TAG }} ${{ steps.login-ecr.outputs.registry }}/payments-microservice:${{ env.IMAGE_TAG }}

      - name: Push Payments Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/payments-microservice:${{ env.IMAGE_TAG }}

      - name: Build Orders Docker Image
        run: |
          docker build -t orders-microservice:${{ env.IMAGE_TAG }} app/orders-microservice

      - name: Tag Orders Docker Image
        run: |
          docker tag orders-microservice:${{ env.IMAGE_TAG }} ${{ steps.login-ecr.outputs.registry }}/orders-microservice:${{ env.IMAGE_TAG }}

      - name: Push Orders Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/orders-microservice:${{ env.IMAGE_TAG }}

      - name: Update Helm Image Tags
        run: |
          sed -i "s/tag: .*/tag: \"${{ env.IMAGE_TAG }}\"/" kubernetes/payments-microservice/values-dev.yaml
          sed -i "s/tag: .*/tag: \"${{ env.IMAGE_TAG }}\"/" kubernetes/orders-microservice/values-dev.yaml

      - name: Commit Updated Helm Values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kubernetes/payments-microservice/values-dev.yaml
          git add kubernetes/orders-microservice/values-dev.yaml
          git commit -m "Update Helm image tags for microservices [skip ci]" || echo "No changes to commit"
          git push